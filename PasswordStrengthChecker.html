<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Password Checker</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 3D Card */
.container {
    width: 350px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    transform: perspective(1000px) rotateX(5deg) rotateY(-5deg);
    transition: 0.3s;
    color: white;
}
.container:hover {
    transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1.05);
}

/* Title */
h2 {
    text-align: center;
}

/* Input */
.input-box {
    position: relative;
}
input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Button */
button {
    position: absolute;
    right: 5px;
    top: 5px;
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #22c55e;
    color: white;
}

/* Strength Text */
#strength-text {
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
}

/* Progress Bar */
.progress {
    height: 10px;
    background: #334155;
    border-radius: 10px;
    margin-top: 15px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    border-radius: 10px;
    transition: 0.4s;
}

/* Suggestions */
#suggestions {
    margin-top: 10px;
    font-size: 13px;
}

/* Glow Effects */
.weak { box-shadow: 0 0 10px red; }
.medium { box-shadow: 0 0 15px orange; }
.strong { box-shadow: 0 0 20px lime; }

</style>
</head>

<body>

<div class="container" id="card">
    <h2>🔐 3D Password Checker</h2>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter password" onkeyup="checkStrength()">
        <button onclick="togglePassword()">👁</button>
    </div>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div id="strength-text"></div>
    <div id="suggestions"></div>
</div>

<script>
function togglePassword() {
    let input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

function checkStrength() {
    let password = document.getElementById("password").value;
    let text = document.getElementById("strength-text");
    let bar = document.getElementById("bar");
    let tips = document.getElementById("suggestions");
    let card = document.getElementById("card");

    let strength = 0;
    let suggestions = [];

    if (password.length >= 8) strength++;
    else suggestions.push("✔ Use at least 8 characters");

    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
    else suggestions.push("✔ Mix uppercase & lowercase");

    if (/[0-9]/.test(password)) strength++;
    else suggestions.push("✔ Add numbers");

    if (/[!@#$%^&*]/.test(password)) strength++;
    else suggestions.push("✔ Add special symbols");

    // Reset glow
    card.classList.remove("weak", "medium", "strong");

    if (password.length === 0) {
        text.innerHTML = "";
        bar.style.width = "0%";
        tips.innerHTML = "";
        return;
    }

    if (strength <= 1) {
        text.innerHTML = "Weak ❌";
        text.style.color = "red";
        bar.style.width = "25%";
        bar.style.background = "red";
        card.classList.add("weak");
    }
    else if (strength <= 3) {
        text.innerHTML = "Medium ⚠️";
        text.style.color = "orange";
        bar.style.width = "60%";
        bar.style.background = "orange";
        card.classList.add("medium");
    }
    else {
        text.innerHTML = "Strong ✅";
        text.style.color = "lime";
        bar.style.width = "100%";
        bar.style.background = "lime";
        card.classList.add("strong");
    }

    tips.innerHTML = suggestions.join("<br>");
}
</script>

</body>
</html>
