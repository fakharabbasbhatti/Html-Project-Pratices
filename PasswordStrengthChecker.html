<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Password Checker</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    text-align: center;
}
.input-box {
    position: relative;
}
input {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: none;
}
button {
    position: absolute;
    right: 5px;
    top: 5px;
    padding: 5px 8px;
    cursor: pointer;
}
#strength-text {
    margin-top: 10px;
    font-weight: bold;
}
.progress {
    height: 8px;
    background: #334155;
    border-radius: 5px;
    margin-top: 10px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    border-radius: 5px;
}
#suggestions {
    margin-top: 10px;
    font-size: 12px;
    text-align: left;
}
</style>

</head>
<body>

<div class="container">
    <h2>Password Checker 🔐</h2>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter password" onkeyup="checkStrength()">
        <button onclick="togglePassword()">Show</button>
    </div>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div id="strength-text"></div>
    <div id="suggestions"></div>
</div>

<script>
function togglePassword() {
    let input = document.getElementById("password");
    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}

function checkStrength() {
    let password = document.getElementById("password").value;
    let text = document.getElementById("strength-text");
    let bar = document.getElementById("bar");
    let suggestions = document.getElementById("suggestions");

    let strength = 0;
    let tips = [];

    if (password.length >= 8) strength++;
    else tips.push("At least 8 characters");

    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
    else tips.push("Use uppercase & lowercase letters");

    if (/[0-9]/.test(password)) strength++;
    else tips.push("Add numbers");

    if (/[!@#$%^&*]/.test(password)) strength++;
    else tips.push("Add special characters");

    // Strength Text + Color
    if (password.length === 0) {
        text.innerHTML = "";
        bar.style.width = "0%";
        suggestions.innerHTML = "";
        return;
    }

    if (strength <= 1) {
        text.innerHTML = "Weak ❌";
        text.style.color = "red";
        bar.style.width = "25%";
        bar.style.background = "red";
    }
    else if (strength <= 3) {
        text.innerHTML = "Medium ⚠️";
        text.style.color = "orange";
        bar.style.width = "60%";
        bar.style.background = "orange";
    }
    else {
        text.innerHTML = "Strong ✅";
        text.style.color = "green";
        bar.style.width = "100%";
        bar.style.background = "green";
    }

    // Suggestions
    suggestions.innerHTML = "<b>Suggestions:</b><br>" + tips.join("<br>");
}
</script>

</body>
</html>
