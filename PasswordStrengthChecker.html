<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Strength Checker</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    width: 300px;
}
input {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 5px;
    border: none;
}
#strength {
    margin-top: 15px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <h2>Password Strength Checker 🔐</h2>

    <input type="password" id="password" placeholder="Enter password" onkeyup="checkStrength()">

    <div id="strength"></div>
</div>

<script>
function checkStrength() {
    let password = document.getElementById("password").value;
    let result = document.getElementById("strength");

    let strength = 0;

    if (password.length >= 8) strength++;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[!@#$%^&*]/.test(password)) strength++;

    if (password.length === 0) {
        result.innerHTML = "";
    }
    else if (strength <= 1) {
        result.innerHTML = "Weak ❌";
        result.style.color = "red";
    }
    else if (strength <= 3) {
        result.innerHTML = "Medium ⚠️";
        result.style.color = "orange";
    }
    else {
        result.innerHTML = "Strong ✅";
        result.style.color = "green";
    }
}
</script>

</body>
</html>
