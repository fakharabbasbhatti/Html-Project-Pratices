<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plugin Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Simple Plugin Tool</h2>
  <input type="text" id="inputText" placeholder="Enter text">
  <button onclick="processText()">Process</button>
  <div class="result" id="result"></div>
</div>

<script>
  function processText() {
    let text = document.getElementById('inputText').value;

    if(text === "") {
      document.getElementById('result').innerText = "Please enter something";
      return;
    }

    // Example plugin feature: convert to uppercase + count characters
    let upper = text.toUpperCase();
    let length = text.length;

    document.getElementById('result').innerText = 
      "Uppercase: " + upper + " | Length: " + length;
  }
</script>

</body>
</html>
